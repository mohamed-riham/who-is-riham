<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Route Refused 404 | M.A. Mohamed Riham</title>
  
  <!-- SEO Elements -->
  <meta name="robots" content="noindex, follow">
  
  <!-- Fonts Matching Main Site -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;650&family=Space+Grotesk:wght@550;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #0A0A0A;
      --container-color: #111111;
      --border-color: #1A1A1A;
      --text-main: #F3F4F6;
      --text-muted: #9CA3AF;
      --accent-color: #3B82F6;
      --accent-glow: rgba(59, 130, 246, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: "Inter", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 1.5rem;
    }

    /* Ambient moving background glow */
    .glow-spot {
      position: absolute;
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, rgba(6, 182, 212, 0.02) 60%, transparent 100%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 10;
      background-color: var(--container-color);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 540px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .warning-icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      color: #EF4444; /* High contrast red */
      animation: pulse 2.5s infinite;
      display: inline-block;
    }

    h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #F3F4F6, #9CA3AF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .system-status {
      display: inline-block;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--accent-color);
      background-color: var(--accent-glow);
      border: 1px solid rgba(59, 130, 246, 0.2);
      padding: 0.35rem 0.8rem;
      border-radius: 6px;
      margin-bottom: 1.5rem;
    }

    p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background-color: #2563EB;
      color: white;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      padding: 0.8rem 1.75rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      max-width: 250px;
    }

    .btn-primary:hover {
      background-color: #3B82F6;
      transform: translateY(-1px);
    }

    .redirect-note {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.75rem;
      color: #6B7280;
      margin-top: 1.5rem;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.85; }
    }

    @media (max-width: 480px) {
      .container {
        padding: 1.75rem;
      }
      h1 {
        font-size: 1.8rem;
      }
      p {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>

  <div class="glow-spot"></div>

  <div class="container">
    <div class="warning-icon">⚠</div>
    <div class="system-status">System Core Error 404</div>
    <h1>Route Unresolved</h1>
    <p>
      The coordinate you requested does not exist on the M.A. Mohamed Riham network directory. 
      Please cross-check your parameters or returns.
    </p>

    <div class="button-group">
      <a href="https://mohamed-riham.github.io/who-is-riham/" class="btn-primary">
        Return to Matrix Home
      </a>
    </div>
  </div>

</body>
</html>
